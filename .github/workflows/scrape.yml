name: Scrape events

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 08:00 Oslo (CEST, summer)
    - cron: "0 7 * * *"   # 07:00 UTC = 08:00 Oslo (CET, winter)
  workflow_dispatch:        # allow manual runs from Actions tab
  push:
    branches: [main]
    paths:
      - "generate.py"
      - "scrapers/**"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        env:
          FB_EVENTS_URL: ${{ secrets.FB_EVENTS_URL }}
        run: python generate.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/events.ics docs/facebook-events-*.ics
          git diff --cached --quiet || git commit -m "chore: update events [skip ci]"
          git push
