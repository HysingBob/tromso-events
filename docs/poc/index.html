<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>Tromsø — drone POC</title>
  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
  <!-- The viewport is the phone screen. The world scrolls/zooms beneath a fixed dot. -->
  <div id="viewport">
    <div id="world">
      <!-- backdrop: a 256px JPEG tile pyramid, filled on demand by the tile
           manager in app.js (built by build_pyramid.py). Replaces the old single
           map.png + the city-centre zoom.png patch. -->
      <div id="tiles"></div>
    </div>
    <!-- glow pools: map-anchored, screen-space, blended over the dimmed world to
         un-dim points of interest. Reprojected each frame like #markers. -->
    <div id="glows" aria-hidden="true"></div>
    <!-- stickers live here (screen-space, never scaled → always crisp) -->
    <div id="markers" aria-hidden="true"></div>
    <div id="dot" aria-hidden="true"></div>
    <!-- coordinate-picker pins (only used in ?pick mode), drawn on top -->
    <div id="pins" aria-hidden="true"></div>
    <div id="debug" hidden></div>
  </div>

  <!-- Event overlay: sticker rolls DOWN from the top (transparent bg), title+text
       slide UP from the bottom — the middle stays open over the map/dot. -->
  <div id="card-backdrop" hidden>
    <img id="card-img" alt="" hidden>
    <div id="card" role="dialog" aria-modal="true" aria-labelledby="card-title">
      <button id="card-close" aria-label="Close">&times;</button>
      <h2 id="card-title"></h2>
      <p id="card-body"></p>
    </div>
  </div>

  <script src="app.js?v=13"></script>
</body>
</html>
